<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thuê Sân Đê | Đăng nhập Quản lý ADM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <main class="login-wrap">
        <section class="login-layout">
            <aside class="login-side">
                <h1>Đăng nhập ADM.</h1>
                <p>Chỉ quản trị.</p>

                <div class="login-stats">
                    <article class="login-stat">
                        <span>Doanh thu dự kiến</span>
                        <strong id="previewRevenue">0 VNĐ</strong>
                    </article>
                    <article class="login-stat">
                        <span>Lịch đang hoạt động</span>
                        <strong id="previewBookings">0</strong>
                    </article>
                    <article class="login-stat">
                        <span>Tổng số sân</span>
                        <strong id="previewFields">0</strong>
                    </article>
                </div>
            </aside>

            <section class="login-box">
                <div id="loginPanel">
                    <div class="login-header">
                        <div class="brand brand-login">
                            <span class="brand-mark">ADM</span>
                            <div>
                                <strong>Quản lý ADM</strong>
                                <span>Dũngcris</span>
                            </div>
                        </div>
                        <h2>Đăng nhập</h2>
                        <p id="demoAccount">Đăng nhập quản trị.</p>
                    </div>

                    <form id="loginForm" class="login-form">
                        <label class="field">
                            <span>Tài khoản</span>
                            <input type="text" id="username" placeholder="Tên đăng nhập" required>
                        </label>
                        <label class="field">
                            <span>Mật khẩu</span>
                            <input type="password" id="password" placeholder="Mật khẩu" required>
                        </label>
                        <button type="submit" class="button-primary wide-button">Đăng nhập</button>
                        <div id="errorMessage" class="error-message"></div>
                    </form>

                    <div class="login-support-links">
                        <button type="button" class="button-link" id="showResetForm">Quên mật khẩu?</button>
                    </div>

                    <div class="login-back-link">
                        <a href="quanly-adm.html">Quay lại cổng Quản lý ADM</a>
                    </div>
                </div>

                <div id="resetPanel" class="reset-panel" style="display:none;">
                    <div class="login-header">
                        <h2>Tạo mật khẩu mới</h2>
                        <p>Nhập mã khôi phục để đổi mật khẩu.</p>
                    </div>

                    <form id="resetPasswordForm" class="login-form">
                        <label class="field">
                            <span>Tài khoản</span>
                            <input type="text" id="resetUsername" placeholder="Tên đăng nhập" required>
                        </label>
                        <label class="field">
                            <span>Mã khôi phục</span>
                            <input type="text" id="recoveryKey" placeholder="Mã khôi phục" required>
                        </label>
                        <label class="field">
                            <span>Mật khẩu mới</span>
                            <input type="password" id="newPassword" placeholder="Mật khẩu mới" required>
                        </label>
                        <label class="field">
                            <span>Nhập lại mật khẩu</span>
                            <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu" required>
                        </label>
                        <button type="submit" class="button-primary wide-button">Tạo mật khẩu mới</button>
                        <div id="resetMessage" class="success-message"></div>
                        <div id="resetErrorMessage" class="error-message"></div>
                    </form>

                    <div class="login-support-links">
                        <button type="button" class="button-link" id="showLoginForm">Quay lại đăng nhập</button>
                    </div>

                    <div class="login-reset-note">
                        <span>Mã khôi phục mặc định: DUNGCRIS2026</span>
                    </div>
                </div>
            </section>
        </section>
    </main>

    <footer class="site-footer">
        <div class="shell">
            <p>Credit: Dũngcris</p>
        </div>
    </footer>

    <script src="js/store.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
